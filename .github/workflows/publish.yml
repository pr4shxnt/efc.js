name: Publish to NPM

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Build packages
        run: npm run build --workspaces --if-present

      - name: Publish changed packages
        run: |
          for pkg in packages/*/; do
            PKG_JSON="./$pkg/package.json"

            # skip if no package.json
            [ -f "$PKG_JSON" ] || continue

            # skip private packages
            IS_PRIVATE=$(node -p "require('$PKG_JSON').private ?? false")
            [ "$IS_PRIVATE" = "true" ] && continue

            PKG_NAME=$(node -p "require('$PKG_JSON').name")
            LOCAL_VER=$(node -p "require('$PKG_JSON').version")
            PUBLISHED=$(npm show "$PKG_NAME@$LOCAL_VER" version 2>/dev/null || echo "")

            if [ -z "$PUBLISHED" ]; then
              echo "→ Publishing $PKG_NAME@$LOCAL_VER"
              npm publish "./$pkg" --access public
            else
              echo "✓ $PKG_NAME@$LOCAL_VER already published, skipping"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
